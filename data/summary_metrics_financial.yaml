plan_execute:
  final_code: |-
    import yaml
    import pandas as pd
    from sklearn.preprocessing import StandardScaler
    from sklearn.compose import ColumnTransformer
    from sklearn.pipeline import Pipeline
    from sklearn.impute import SimpleImputer
    from sklearn.preprocessing import OneHotEncoder
    from sklearn.preprocessing import LabelEncoder
    from imblearn.over_sampling import SMOTE
    from sklearn.metrics import accuracy_score
    from sklearn.ensemble import GradientBoostingClassifier
    import numpy as np

    # Initialize metrics dictionary
    model_new_score = {
        'on_new_data': 0.0,
        'on_old_data': 0.0
    }

    # Load data from specified folder
    dataset_folder = "datasets/financial"
    X_train_old = pd.read_csv(f"{dataset_folder}/X_train_old.csv")
    X_test_old = pd.read_csv(f"{dataset_folder}/X_test_old.csv")
    y_train_old = pd.read_csv(f"{dataset_folder}/y_train_old.csv").squeeze("columns")
    y_test_old = pd.read_csv(f"{dataset_folder}/y_test_old.csv").squeeze("columns")

    X_train_new = pd.read_csv(f"{dataset_folder}/X_train_new.csv")
    y_train_new = pd.read_csv(f"{dataset_folder}/y_train_new.csv").squeeze("columns")
    X_test_new = pd.read_csv(f"{dataset_folder}/X_test_new.csv")
    y_test_new = pd.read_csv(f"{dataset_folder}/y_test_new.csv").squeeze("columns")

    # Define preprocessing pipeline
    numerical_features = ['Age', 'Income', 'Credit Score', 'Loan Amount', 'Loan Term', 'Interest Rate', 'Employment Length']
    categorical_features = ['Home Ownership', 'Marital Status', 'Dependents']

    num_transformer = Pipeline([
        ('imputer', SimpleImputer(strategy='median')),
        ('scaler', StandardScaler(with_mean=False))
    ])

    cat_transformer = Pipeline([
        ('imputer', SimpleImputer(strategy='constant', fill_value='missing')),
        ('onehot', OneHotEncoder(handle_unknown='ignore'))
    ])

    # Scale Income and Interest Rate
    Income_scaler = StandardScaler()
    Interest_Rate_scaler = StandardScaler(with_mean=False)

    X_train_old[['Income']] = Income_scaler.fit_transform(X_train_old[['Income']])
    X_train_old[['Interest Rate']] = Interest_Rate_scaler.fit_transform(X_train_old[['Interest Rate']])
    X_test_old[['Income']] = Income_scaler.transform(X_test_old[['Income']])
    X_test_old[['Interest Rate']] = Interest_Rate_scaler.transform(X_test_old[['Interest Rate']])

    X_train_new[['Income']] = Income_scaler.fit_transform(X_train_new[['Income']])
    X_train_new[['Interest Rate']] = Interest_Rate_scaler.fit_transform(X_train_new[['Interest Rate']])

    # One-hot encoding for Home Ownership and Marital Status
    X_train_old[['Home Ownership', 'Marital Status']] = pd.get_dummies(X_train_old[['Home Ownership', 'Marital Status']])
    X_test_old[['Home Ownership', 'Marital Status']] = pd.get_dummies(X_test_old[['Home Ownership', 'Marital Status']])
    X_train_new[['Home Ownership', 'Marital Status']] = pd.get_dummies(X_train_new[['Home Ownership', 'Marital Status']])

    # Label encoding for Dependents
    le = LabelEncoder()
    X_train_old['Dependents'] = le.fit_transform(X_train_old['Dependents'])
    X_test_old['Dependents'] = le.fit_transform(X_test_old['Dependents'])
    X_train_new['Dependents'] = le.fit_transform(X_train_new['Dependents'])

    # Combine old and new data
    X_train_combined = pd.concat([pd.DataFrame(X_train_old.drop(['Home Ownership', 'Marital Status'], axis=1).values),
                                pd.DataFrame(X_train_new.drop(['Home Ownership', 'Marital Status'], axis=1).values)])
    y_train_combined = pd.concat([y_train_old, y_train_new])

    # Feature balancing and class weight
    X_train_combined = SMOTE().fit_resample(X_train_combined, y_train_combined)

    # Apply one-hot encoding for Home Ownership and Marital Status to X_train_combined
    X_train_combined = pd.get_dummies(X_train_combined, columns=['Home Ownership', 'Marital Status'])

    # Train GradientBoostingClassifier on combined data
    model_new = GradientBoostingClassifier(
        n_estimators=150,
        learning_rate=0.1,
        max_depth=5,
        subsample=0.8,
        random_state=42
    )

    model_new.fit(X_train_combined, y_train_combined)

    # Evaluate model on old test set
    old_score = accuracy_score(y_test_old, model_new.predict(Pipeline([
        ('preprocessor', ColumnTransformer(
            transformers=[
                ('num', num_transformer, numerical_features),
                ('cat', cat_transformer, categorical_features)
            ]
        ))
    ]).fit_transform(X_test_old.drop(['Home Ownership', 'Marital Status'], axis=1))))

    print(f'New model evaluated on old distribution: {old_score}')
    model_new_score['on_old_data'] = float(old_score)

    # Evaluate model on new test set
    new_score = accuracy_score(y_test_new, model_new.predict(Pipeline([
        ('preprocessor', ColumnTransformer(
            transformers=[
                ('num', num_transformer, numerical_features),
                ('cat', cat_transformer, categorical_features)
            ]
        ))
    ]).fit_transform(X_test_new.drop(['Home Ownership', 'Marital Status'], axis=1))))

    print(f'New model evaluated on new distribution: {new_score}')
    model_new_score['on_new_data'] = float(new_score)

    # Save metrics
    with open('metrics_plan_execute.yaml', 'w') as f:
        yaml.dump({'model_new_score': model_new_score}, f)
  final_metrics:
    old_distribution: 0.9133333333333333
    new_distribution: 0.7166666666666667
