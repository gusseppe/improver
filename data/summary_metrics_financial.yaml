reflection:
  final_code: |-
    import yaml
    import pandas as pd
    import numpy as np
    from sklearn.preprocessing import StandardScaler, MinMaxScaler, RobustScaler
    from sklearn.compose import ColumnTransformer
    from sklearn.pipeline import Pipeline
    from sklearn.ensemble import RandomForestClassifier, GradientBoostingClassifier
    from sklearn.feature_selection import SelectFromModel, SelectKBest
    from sklearn.metrics import accuracy_score, confusion_matrix, f1_score, precision_score, recall_score
    from sklearn.model_selection import train_test_split
    import lightgbm as lgb
    from lightgbm import LGBMClassifier
    from sklearn.preprocessing import OneHotEncoder

    # Initialize metrics dictionary
    model_new_score = {
        'on_new_data': 0.0,
        'on_old_data': 0.0
    }

    # Load data from specified folder
    dataset_folder = "datasets/financial"
    X_train_old = pd.read_csv(f"{dataset_folder}/X_train_old.csv")
    X_test_old = pd.read_csv(f"{dataset_folder}/X_test_old.csv")
    y_train_old = pd.read_csv(f"{dataset_folder}/y_train_old.csv").squeeze("columns")
    y_test_old = pd.read_csv(f"{dataset_folder}/y_test_old.csv").squeeze("columns")

    # Load new data
    X_train_new = pd.read_csv(f"{dataset_folder}/X_train_new.csv")
    y_train_new = pd.read_csv(f"{dataset_folder}/y_train_new.csv").squeeze("columns")
    X_test_new = pd.read_csv(f"{dataset_folder}/X_test_new.csv")
    y_test_new = pd.read_csv(f"{dataset_folder}/y_test_new.csv").squeeze("columns")

    # Define feature types
    numerical_features = ['Age', 'Income', 'Credit Score', 'Loan Amount', 'Loan Term', 'Interest Rate', 'Employment Length']
    categorical_features = ['Home Ownership', 'Marital Status', 'Dependents']

    # Create preprocessing pipeline
    preprocessor = ColumnTransformer(
        transformers=[
            ('num', StandardScaler(), numerical_features),
            ('cat', OneHotEncoder(handle_unknown='ignore'), categorical_features)
        ],
        remainder='passthrough'
    )

    # Define feature selector
    selector = SelectFromModel(RandomForestClassifier())

    # Create pipeline with preprocessing, feature selection, and model
    pipeline = Pipeline([
        ('preprocessor', preprocessor),
        ('selector', selector),
        ('classifier', LGBMClassifier(
            objective='binary',
            num_leaves=31,
            learning_rate=0.1,
            max_depth=-1,
            min_child_samples=100,
            subsample=0.8,
            colsample_bytree=0.8,
            random_state=42
        ))
    ])

    # Combine old and new training data
    X_train_combined = pd.concat([X_train_old, X_train_new])
    y_train_combined = pd.concat([y_train_old, y_train_new])

    # Ensure all column names are strings to avoid type errors
    X_train_combined.columns = X_train_combined.columns.astype(str)
    X_test_old.columns = X_test_old.columns.astype(str)
    X_test_new.columns = X_test_new.columns.astype(str)

    # Split data into training and validation sets
    X_train, X_val, y_train, y_val = train_test_split(X_train_combined, y_train_combined, test_size=0.2, random_state=42)

    # Convert data into LightGBM format
    train_data = lgb.Dataset(X_train, label=y_train)
    val_data = lgb.Dataset(X_val, label=y_val)

    # Train the pipeline
    params = {'objective': 'binary', 'num_leaves': 31, 'learning_rate': 0.1, 'max_depth': -1, 'min_child_samples': 100, 'subsample': 0.8, 'colsample_bytree': 0.8, 'random_state': 42}
    model = lgb.train(params, train_data, num_boost_round=100, valid_sets=[val_data], early_stopping_rounds=5, verbose_eval=10)

    # Convert data back to Pandas DataFrame
    predictions = model.predict(X_test_old)
    predictions = np.round(predictions)

    # Evaluate on old distribution
    old_score = accuracy_score(y_test_old, predictions)
    f1_score_old = f1_score(y_test_old, predictions)
    precision_old = precision_score(y_test_old, predictions)
    recall_old = recall_score(y_test_old, predictions)
    print(f'New model evaluated on old distribution: Accuracy = {old_score}, F1-score = {f1_score_old}, Precision = {precision_old}, Recall = {recall_old}')
    model_new_score['on_old_data'] = {
        'accuracy': float(old_score),
        'f1_score': float(f1_score_old),
        'precision': float(precision_old),
        'recall': float(recall_old)
    }

    # Convert data back to Pandas DataFrame
    predictions = model.predict(X_test_new)
    predictions = np.round(predictions)

    # Evaluate on new distribution
    new_score = accuracy_score(y_test_new, predictions)
    f1_score_new = f1_score(y_test_new, predictions)
    precision_new = precision_score(y_test_new, predictions)
    recall_new = recall_score(y_test_new, predictions)
    print(f'New model evaluated on new distribution: Accuracy = {new_score}, F1-score = {f1_score_new}, Precision = {precision_new}, Recall = {recall_new}')
    model_new_score['on_new_data'] = {
        'accuracy': float(new_score),
        'f1_score': float(f1_score_new),
        'precision': float(precision_new),
        'recall': float(recall_new)
    }

    # Save metrics
    with open('metrics_reflection.yaml', 'w') as f:
        yaml.dump({'model_new_score': model_new_score}, f)
  final_metrics:
    old_distribution: 0.9133333333333333
    new_distribution: 0.7166666666666667
