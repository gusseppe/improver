plan_execute:
  final_code: |-
    import yaml
    import pandas as pd
    from sklearn.preprocessing import StandardScaler, Normalizer
    from sklearn.compose import ColumnTransformer
    from sklearn.pipeline import Pipeline
    from sklearn.compose import Pipeline
    from sklearn.preprocessing import OneHotEncoder
    from sklearn.ensemble import RandomForestClassifier
    from sklearn.metrics import accuracy_score

    # Initialize metrics dictionary
    model_new_score = {
        'on_new_data': 0.0,
        'on_old_data': 0.0
    }

    # Load data from specified folder
    dataset_folder = "datasets/eligibility"
    X_train_old = pd.read_csv(f"{dataset_folder}/X_train_old.csv")
    X_test_old = pd.read_csv(f"{dataset_folder}/X_test_old.csv")
    y_train_old = pd.read_csv(f"{dataset_folder}/y_train_old.csv").squeeze("columns")
    y_test_old = pd.read_csv(f"{dataset_folder}/y_test_old.csv").squeeze("columns")

    # Load new data
    X_train_new = pd.read_csv(f"{dataset_folder}/X_train_new.csv")
    y_train_new = pd.read_csv(f"{dataset_folder}/y_train_new.csv").squeeze("columns")
    X_test_new = pd.read_csv(f"{dataset_folder}/X_test_new.csv")
    y_test_new = pd.read_csv(f"{dataset_folder}/y_test_new.csv").squeeze("columns")

    # Select numerical features
    numerical_features = ["Age", "Income"]

    # Define preprocessing pipelines for numerical and categorical data
    numerical_pipeline = Pipeline([
        ('scaler', StandardScaler()),
        ('normalizer', Normalizer(norm='l1')) # L1 Normalizer to evaluate its impact
    ])

    categorical_features = ['Education Level', 'Employment Status', 'Marital Status']
    categorical_pipeline = Pipeline([
        ('encoder', OneHotEncoder(sparse=False, handle_unknown='ignore'))
    ])

    # Create an estimator chain using ColumnTransformer
    preprocessor = ColumnTransformer(
        transformers=[
            ('num', numerical_pipeline, numerical_features),
            ('cat', categorical_pipeline, categorical_features)
        ]
    )

    # Fit and transform data using the preprocessor
    X_train_old_transformed = preprocessor.fit_transform(X_train_old)
    X_test_old_transformed = preprocessor.transform(X_test_old)
    X_train_new_transformed = preprocessor.fit_transform(X_train_new)
    X_test_new_transformed = preprocessor.transform(X_test_new)

    # Combine old and new data for training
    X_train_combined = pd.concat([pd.DataFrame(X_train_old_transformed), pd.DataFrame(X_train_new_transformed)])
    y_train_combined = pd.concat([y_train_old, y_train_new])

    # Train RandomForestClassifier on combined and preprocessed data
    model_new = RandomForestClassifier(
        n_estimators=20, # smaller number of estimators
        random_state=42
    )

    model_new.fit(X_train_combined, y_train_combined)

    # Evaluate model on old test set
    old_score = accuracy_score(y_test_old, model_new.predict(X_test_old_transformed))
    print(f'New model evaluated on old distribution: {old_score}')
    model_new_score['on_old_data'] = float(old_score)

    # Evaluate model on new test set
    new_score = accuracy_score(y_test_new, model_new.predict(X_test_new_transformed))
    print(f'New model evaluated on new distribution: {new_score}')
    model_new_score['on_new_data'] = float(new_score)

    # Save metrics
    with open('metrics_plan_execute.yaml', 'w') as f:
        yaml.dump({'model_new_score': model_new_score}, f)
  final_metrics:
    old_distribution: 0.7833333333333333
    new_distribution: 0.6333333333333333
