reflection:
  final_code: |-
    import yaml
    import pandas as pd
    import numpy as np
    from sklearn.preprocessing import StandardScaler, OneHotEncoder
    from sklearn.compose import ColumnTransformer
    from sklearn.pipeline import Pipeline
    from sklearn.ensemble import GradientBoostingRegressor
    from sklearn.metrics import mean_squared_error, r2_score

    # Initialize metrics dictionary
    model_new_score = {
        'on_new_data': {
            'mse': 0.0,
            'r2_score': 0.0
        },
        'on_old_data': {
            'mse': 0.0,
            'r2_score': 0.0
        }
    }

    # Load data from specified folder
    dataset_folder = "datasets/eligibility"
    X_train_old = pd.read_csv(f"{dataset_folder}/X_train_old.csv")
    X_test_old = pd.read_csv(f"{dataset_folder}/X_test_old.csv")
    y_train_old = pd.read_csv(f"{dataset_folder}/y_train_old.csv").squeeze("columns")
    y_test_old = pd.read_csv(f"{dataset_folder}/y_test_old.csv").squeeze("columns")

    # Load new data
    X_train_new = pd.read_csv(f"{dataset_folder}/X_train_new.csv")
    y_train_new = pd.read_csv(f"{dataset_folder}/y_train_new.csv").squeeze("columns")
    X_test_new = pd.read_csv(f"{dataset_folder}/X_test_new.csv")
    y_test_new = pd.read_csv(f"{dataset_folder}/y_test_new.csv").squeeze("columns")

    # Scale target variables
    scaler = StandardScaler()
    y_train_combined = pd.concat([y_train_old, y_train_new])
    y_train_scaled = scaler.fit_transform(y_train_combined.values.reshape(-1, 1))
    y_test_old_scaled = scaler.transform(y_test_old.values.reshape(-1, 1))
    y_test_new_scaled = scaler.transform(y_test_new.values.reshape(-1, 1))

    # Define feature types
    numerical_features = ['Age', 'Income']
    categorical_features = ['Education Level', 'Employment Status', 'Marital Status']

    # Create preprocessing pipeline
    preprocessor = ColumnTransformer(
        transformers=[
            ('num', StandardScaler(), numerical_features),
            ('cat', OneHotEncoder(handle_unknown='ignore'), categorical_features)
        ],
        remainder='passthrough'
    )

    # Create pipeline with preprocessing and model
    pipeline = Pipeline([
        ('preprocessor', preprocessor),
        ('classifier', GradientBoostingRegressor(
            n_estimators=100,
            learning_rate=0.1,
            max_depth=3,
            subsample=0.8,
            random_state=42
        ))
    ])

    # Combine old and new training data
    X_train_combined = pd.concat([X_train_old, X_train_new]).reset_index(drop=True)

    # Ensure all column names are strings to avoid type errors
    X_train_combined.columns = X_train_combined.columns.astype(str)
    X_test_old.columns = X_test_old.columns.astype(str)
    X_test_new.columns = X_test_new.columns.astype(str)

    # Train the pipeline
    pipeline.fit(X_train_combined, y_train_scaled.ravel())

    # Evaluate on old distribution
    old_predictions_scaled = pipeline.predict(X_test_old)
    old_mse = mean_squared_error(y_test_old, old_predictions_scaled)
    old_r2 = r2_score(y_test_old, old_predictions_scaled)
    print(f'Old distribution MSE: {old_mse}')
    print(f'Old distribution R2 score: {old_r2}')
    model_new_score['on_old_data'] = {'mse': float(old_mse), 'r2_score': float(old_r2)}

    # Evaluate on new distribution
    new_predictions_scaled = pipeline.predict(X_test_new)
    new_mse = mean_squared_error(y_test_new, new_predictions_scaled)
    new_r2 = r2_score(y_test_new, new_predictions_scaled)
    print(f'New distribution MSE: {new_mse}')
    print(f'New distribution R2 score: {new_r2}')
    model_new_score['on_new_data'] = {'mse': float(new_mse), 'r2_score': float(new_r2)}

    # Save metrics to a YAML file
    with open('metrics_reflection.yaml', 'w') as f:
        yaml.dump(model_new_score, f, default_flow_style=False)
  final_metrics:
    old_distribution: 0.7833333333333333
    new_distribution: 0.6333333333333333
