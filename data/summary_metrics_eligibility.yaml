self_discovery:
  final_code: |-
    from sklearn.ensemble import GradientBoostingClassifier, RandomForestClassifier
    import pandas as pd
    import numpy as np
    import yaml
    from sklearn.preprocessing import StandardScaler
    from sklearn.ensemble import GradientBoostingClassifier
    from sklearn.metrics import accuracy_score
    from sklearn.model_selection import train_test_split
    from sklearn.impute import SimpleImputer
    from sklearn.compose import ColumnTransformer
    from sklearn.pipeline import Pipeline

    # Initialize metrics
    model_new_score = {
        'on_old_data': 0.0,
        'on_new_data': 0.0
    }

    # Load data - USE THESE EXACT PATHS
    dataset_folder = "datasets/eligibility"
    X_train_old = pd.read_csv(f"{dataset_folder}/X_train_old.csv")
    X_test_old = pd.read_csv(f"{dataset_folder}/X_test_old.csv")
    y_train_old = pd.read_csv(f"{dataset_folder}/y_train_old.csv").squeeze("columns")
    y_test_old = pd.read_csv(f"{dataset_folder}/y_test_old.csv").squeeze("columns")

    X_train_new = pd.read_csv(f"{dataset_folder}/X_train_new.csv")
    X_test_new = pd.read_csv(f"{dataset_folder}/X_test_new.csv")
    y_train_new = pd.read_csv(f"{dataset_folder}/y_train_new.csv").squeeze("columns")
    y_test_new = pd.read_csv(f"{dataset_folder}/y_test_new.csv").squeeze("columns")

    # Define preprocessing functions
    numerical_features = ['Age', 'Income']
    categorical_features = ['Education Level', 'Employment Status', 'Marital Status']

    numerical_transformer = Pipeline(steps=[
        ('imputer', SimpleImputer(strategy='median')),
        ('scaler', StandardScaler())
    ])

    categorical_transformer = Pipeline(steps=[
        ('imputer', SimpleImputer(strategy='constant', fill_value='missing')),
        ('onehot', OneHotEncoder(handle_unknown='ignore'))
    ])

    preprocessor = ColumnTransformer(
        transformers=[
            ('num', numerical_transformer, numerical_features),
            ('cat', categorical_transformer, categorical_features)])

    # Apply preprocessing to old data
    X_train_old_preprocessed = preprocessor.fit_transform(X_train_old)
    X_test_old_preprocessed = preprocessor.transform(X_test_old)

    X_train_new_preprocessed = preprocessor.fit_transform(X_train_new)
    X_test_new_preprocessed = preprocessor.transform(X_test_new)

    # Combine datasets
    X_train_combined = pd.concat([X_train_old_preprocessed, X_train_new_preprocessed])
    y_train_combined = pd.concat([y_train_old, y_train_new])

    # Split old data into training and testing sets
    X_train_old, X_val_old, y_train_old, y_val_old = train_test_split(X_train_old_preprocessed, y_train_old, test_size=0.2, random_state=42)

    # Train model
    model = GradientBoostingClassifier(random_state=42)
    model.fit(X_train_combined, y_train_combined)

    # Evaluate on old distribution
    y_pred_old = model.predict(X_test_old_preprocessed)
    old_score = accuracy_score(y_test_old, y_pred_old)
    print(f'Model evaluated on old distribution: {old_score}')
    model_new_score['on_old_data'] = float(old_score)

    # Evaluate on new distribution
    y_pred_new = model.predict(X_test_new_preprocessed)
    new_score = accuracy_score(y_test_new, y_pred_new)
    print(f'Model evaluated on new distribution: {new_score}')
    model_new_score['on_new_data'] = float(new_score)

    # Save metrics
    with open('metrics_self_discovery.yaml', 'w') as f:
        yaml.dump({'model_new_score': model_new_score}, f)
  final_metrics:
    old_distribution: 0.7833333333333333
    new_distribution: 0.6333333333333333
