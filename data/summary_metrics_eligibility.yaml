    X_test_old = pd.read_csv(f"{dataset_folder}/X_test_old.csv")
    y_train_old = pd.read_csv(f"{dataset_folder}/y_train_old.csv").squeeze("columns")
    y_test_old = pd.read_csv(f"{dataset_folder}/y_test_old.csv").squeeze("columns")

    X_train_new = pd.read_csv(f"{dataset_folder}/X_train_new.csv")
    X_test_new = pd.read_csv(f"{dataset_folder}/X_test_new.csv")
    y_train_new = pd.read_csv(f"{dataset_folder}/y_train_new.csv").squeeze("columns")
    y_test_new = pd.read_csv(f"{dataset_folder}/y_test_new.csv").squeeze("columns")

    # Combine old and new training data
    X_train_combined = pd.concat([X_train_old, X_train_new])
    y_train_combined = pd.concat([y_train_old, y_train_new])

    # Separate numerical and categorical features
    numerical_features = ['Age', 'Income']
    categorical_features = ['Education Level', 'Employment Status', 'Marital Status']

    # Define the preprocessing steps
    numerical_transformer = SimpleImputer(strategy='median')
    categorical_transformer = OneHotEncoder(handle_unknown='ignore')

    # Define the preprocessing pipeline
    preprocessor = ColumnTransformer(
        transformers=[
            ('num', numerical_transformer, numerical_features),
            ('cat', categorical_transformer, categorical_features)
        ]
    )

    # Fit the preprocessing pipeline to the training data
    preprocessor.fit(X_train_combined)

    # Apply the preprocessing pipeline to the training and testing data
    X_train_transformed = preprocessor.transform(X_train_combined)
    X_test_old_transformed = preprocessor.transform(X_test_old)
    X_test_new_transformed = preprocessor.transform(X_test_new)

    # Define the hyperparameter grid for GridSearchCV
    param_grid = {
        'n_estimators': [100, 200, 300, 400, 500],
        'max_depth': [None, 5, 10, 15, 20],
        'min_samples_split': [2, 5, 10],
        'min_samples_leaf': [1, 2, 4]
    }

    # Perform GridSearchCV
    grid_search = GridSearchCV(RandomForestClassifier(random_state=42), param_grid, cv=5, scoring='f1_macro')
    grid_search.fit(X_train_transformed, y_train_combined)

    # Get the best model and its parameters
    best_model = grid_search.best_estimator_
    best_params = grid_search.best_params_

    # Predict on the old and new test sets using the best model
    old_accuracy = best_model.score(X_test_old_transformed, y_test_old)
    new_accuracy = best_model.score(X_test_new_transformed, y_test_new)

    print(f'Model trained and evaluated on both distributions old accuracy: {old_accuracy}, new accuracy: {new_accuracy}')

    # Save metrics to 'metrics_codeact.yaml'
    import yaml
    model_new_score = {'on_new_data': float(new_accuracy), 'on_old_data': float(old_accuracy)}
    with open('metrics_codeact.yaml', 'w') as f:
        yaml.dump({'model_new_score': model_new_score}, f)
  final_metrics:
    old_distribution: 0.7733333333333333
    new_distribution: 0.5666666666666667
