tot:
  final_code: |-
    import yaml
    import pandas as pd
    from sklearn.ensemble import RandomForestClassifier, VotingClassifier
    from sklearn.model_selection import train_test_split
    from sklearn.metrics import accuracy_score

    # Initialize metrics dictionary
    model_new_score = {
        'on_new_data': 0.0,
        'on_old_data': 0.0
    }

    # Load data from specified folder
    dataset_folder = "datasets/nasa-FD002"
    X_train_old = pd.read_csv(f"{dataset_folder}/X_train_old.csv")
    X_test_old = pd.read_csv(f"{dataset_folder}/X_test_old.csv")
    y_train_old = pd.read_csv(f"{dataset_folder}/y_train_old.csv").squeeze("columns")
    y_test_old = pd.read_csv(f"{dataset_folder}/y_test_old.csv").squeeze("columns")

    # Load new data
    X_train_new = pd.read_csv(f"{dataset_folder}/X_train_new.csv")
    y_train_new = pd.read_csv(f"{dataset_folder}/y_train_new.csv").squeeze("columns")
    X_test_new = pd.read_csv(f"{dataset_folder}/X_test_new.csv")
    y_test_new = pd.read_csv(f"{dataset_folder}/y_test_new.csv").squeeze("columns")

    # Combine old and new data
    X_train = pd.concat([X_train_old, X_train_new])
    y_train = pd.concat([y_train_old, y_train_new])

    # Split data into training and validation sets
    X_train_val, X_val, y_train_val, y_val = train_test_split(X_train, y_train, test_size=0.2, random_state=42)

    # Define baseline model
    model1 = RandomForestClassifier(n_estimators=100, random_state=42)

    # Define ensemble model
    ensemble = VotingClassifier(estimators=[('rf', model1)], voting='soft')

    # Train baseline model
    model1.fit(X_train_val, y_train_val)

    # Train ensemble model
    ensemble.fit(X_train_val, y_train_val)

    # Evaluate baseline model on old distribution
    old_accuracy = accuracy_score(y_test_old, model1.predict(X_test_old))
    print(f'Baseline model evaluated on the old distribution: {old_accuracy}')
    model_new_score['on_old_data'] = float(old_accuracy)

    # Evaluate ensemble model on old distribution
    ensemble_accuracy = accuracy_score(y_test_old, ensemble.predict(X_test_old))
    print(f'Ensemble model evaluated on the old distribution: {ensemble_accuracy}')

    # Evaluate both models on new distribution
    new_accuracy_model1 = accuracy_score(y_test_new, model1.predict(X_test_new))
    new_accuracy_ensemble = accuracy_score(y_test_new, ensemble.predict(X_test_new))
    print(f'Baseline model evaluated on new distribution: {new_accuracy_model1}')
    print(f'Ensemble model evaluated on new distribution: {new_accuracy_ensemble}')

    # Save metrics
    model_new_score['on_new_data'] = float(new_accuracy_ensemble)

    with open('metrics_tot.yaml', 'w') as f:
        yaml.dump({'model_new_score': model_new_score}, f)

    # Print final metrics
    print(f'Final model evaluation metrics on new data: {model_new_score}')
  final_metrics:
    old_distribution: 0.6825
    new_distribution: 0.51
