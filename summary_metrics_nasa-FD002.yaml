reflection:
  final_code: |-
    import yaml
    import pandas as pd
    import numpy as np
    from sklearn.preprocessing import RobustScaler, OneHotEncoder, OrdinalEncoder
    from sklearn.compose import ColumnTransformer
    from sklearn.pipeline import Pipeline
    from sklearn.ensemble import GradientBoostingClassifier
    from sklearn.model_selection import train_test_split, RandomizedSearchCV
    from sklearn.metrics import accuracy_score
    from scipy.stats import randint

    # Initialize metrics dictionary
    model_new_score = {
        'on_new_data': 0.0,
        'on_old_data': 0.0
    }

    # Load data from specified folder
    dataset_folder = "datasets/nasa-FD002"
    X_train_old = pd.read_csv(f"{dataset_folder}/X_train_old.csv")
    X_test_old = pd.read_csv(f"{dataset_folder}/X_test_old.csv")
    y_train_old = pd.read_csv(f"{dataset_folder}/y_train_old.csv").squeeze("columns")
    y_test_old = pd.read_csv(f"{dataset_folder}/y_test_old.csv").squeeze("columns")

    # Load new data
    X_train_new = pd.read_csv(f"{dataset_folder}/X_train_new.csv")
    y_train_new = pd.read_csv(f"{dataset_folder}/y_train_new.csv").squeeze("columns")
    X_test_new = pd.read_csv(f"{dataset_folder}/X_test_new.csv")
    y_test_new = pd.read_csv(f"{dataset_folder}/y_test_new.csv").squeeze("columns")

    # Define preprocessing steps
    numerical_features = ['Setting_1', 'Setting_2', 'Setting_3', 'LPC_outlet_temperature', 'Physical_fan_speed', 'Corrected_core_speed', 'Burner_fuel_air_ratio']
    categorical_features = []

    for col in X_train_old.columns:
        if pd.api.types.is_object_dtype(X_train_old[col]):
            categorical_features.append(col)

    ordinal_features = ['Setting_1', 'Setting_2', 'Setting_3'] # assuming ordinal features, check with domain knowledge

    # Create preprocessing pipeline
    preprocessor = ColumnTransformer(
        transformers=[
            ('num', RobustScaler(), numerical_features),
            ('cat', OneHotEncoder(handle_unknown='ignore'), categorical_features),
            ('ord', OrdinalEncoder(), ordinal_features)
        ],
        remainder='passthrough'
    )

    # Define hyperparameters to search over
    param_grid = {
        'classifier__n_estimators': [50, 100],
        'classifier__learning_rate': [0.1, 0.5],
        'classifier__max_depth': [3, 5],
        'classifier__subsample': [0.5, 0.8]
    }

    # Create pipeline with preprocessing and model
    pipeline = Pipeline([
        ('preprocessor', preprocessor),
        ('classifier', GradientBoostingClassifier(random_state=42))
    ])

    # Combine old and new training data
    X_train_combined = pd.concat([X_train_old, X_train_new])
    y_train_combined = pd.concat([y_train_old, y_train_new])

    # Ensure all column names are strings to avoid type errors
    X_train_combined.columns = X_train_combined.columns.astype(str)
    X_test_old.columns = X_test_old.columns.astype(str)
    X_test_new.columns = X_test_new.columns.astype(str)

    # Split the combined data into training and validation sets
    X_train_combined_split, X_val_combined, y_train_combined_split, y_val_combined = train_test_split(X_train_combined, y_train_combined, test_size=0.2, random_state=42)

    # Perform RandomizedSearchCV to optimize hyperparameters
    random_search = RandomizedSearchCV(
        pipeline,
        param_distributions=param_grid,
        n_iter=5,
        cv=5,
        scoring='f1_macro',
        random_state=42,
        n_jobs=-1  # This will use all available cores for faster computation
    )
    random_search.fit(X_train_combined_split, y_train_combined_split)

    # Get optimized pipeline
    opt_pipeline = random_search.best_estimator_

    # Evaluate on old distribution
    old_predictions = opt_pipeline.predict(X_test_old)
    old_score = accuracy_score(y_test_old, old_predictions)
    print(f'New model evaluated on old distribution: {old_score}')
    model_new_score['on_old_data'] = float(old_score)

    # Evaluate on new distribution
    new_predictions = opt_pipeline.predict(X_test_new)
    new_score = accuracy_score(y_test_new, new_predictions)
    print(f'New model evaluated on new distribution: {new_score}')
    model_new_score['on_new_data'] = float(new_score)

    # Save metrics
    with open('metrics_reflection.yaml', 'w') as f:
        yaml.dump({'model_new_score': model_new_score}, f)
  final_metrics:
    old_distribution: 0.695
    new_distribution: 0.47625
