standard:
  final_code: |-
    import pandas as pd
    from sklearn.ensemble import RandomForestClassifier
    from sklearn.model_selection import train_test_split
    from sklearn.preprocessing import StandardScaler
    from sklearn.metrics import accuracy_score

    # Initialize metrics dictionary
    model_new_score = {
        'on_new_data': 0.0,
        'on_old_data': 0.0
    }

    # Load data from specified folder
    dataset_folder = "datasets/nasa-FD002"
    X_train_old = pd.read_csv(f"{dataset_folder}/X_train_old.csv")
    X_test_old = pd.read_csv(f"{dataset_folder}/X_test_old.csv")
    y_train_old = pd.read_csv(f"{dataset_folder}/y_train_old.csv").squeeze("columns")
    y_test_old = pd.read_csv(f"{dataset_folder}/y_test_old.csv").squeeze("columns")

    # Load new data
    X_train_new = pd.read_csv(f"{dataset_folder}/X_train_new.csv")
    X_test_new = pd.read_csv(f"{dataset_folder}/X_test_new.csv")
    y_train_new = pd.read_csv(f"{dataset_folder}/y_train_new.csv").squeeze("columns")
    y_test_new = pd.read_csv(f"{dataset_folder}/y_test_new.csv").squeeze("columns")

    # Combine old and new data
    X_train = pd.concat([X_train_old, X_train_new])
    y_train = pd.concat([y_train_old, y_train_new])
    X_test = pd.concat([X_test_old, X_test_new])

    # Split data into training and validation sets
    X_train, X_val, y_train, y_val = train_test_split(X_train, y_train, test_size=0.2, random_state=42)

    # Scale data using StandardScaler
    scaler = StandardScaler()
    X_train_scaled = scaler.fit_transform(X_train)
    X_val_scaled = scaler.transform(X_val)
    X_test_scaled = scaler.transform(X_test)

    # Try increasing the number of estimators for better model capacity
    model_new = RandomForestClassifier(
        n_estimators=500,
        random_state=42
    )

    model_new.fit(X_train_scaled, y_train)

    # Evaluate new model on validation set
    new_score_val = accuracy_score(y_val, model_new.predict(X_val_scaled))
    print(f'New model evaluated on validation set: {new_score_val}')
    model_new_score['on_old_data'] = float(new_score_val)

    # Evaluate new model on test set
    new_score_test = accuracy_score(y_test_new, model_new.predict(X_test_scaled))
    print(f'New model evaluated on test set: {new_score_test}')
    model_new_score['on_new_data'] = float(new_score_test)

    # Save metrics
    with open('metrics_baseline.yaml', 'w') as f:
        yaml.dump({'model_new_score': model_new_score}, f)
  final_metrics:
    old_distribution: 0.72125
    new_distribution: 0.265
