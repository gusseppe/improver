    import yaml
    import pandas as pd
    from sklearn.ensemble import GradientBoostingClassifier
    from sklearn.metrics import accuracy_score


    # Initialize metrics dictionary
    model_new_score = {
        'on_new_data': 0.0,
        'on_old_data': 0.0
    }


    # Load data from specified folder
    dataset_folder = "datasets/healthcare"
    X_train_old = pd.read_csv(f"{dataset_folder}/X_train_old.csv")
    X_test_old = pd.read_csv(f"{dataset_folder}/X_test_old.csv")
    y_train_old = pd.read_csv(f"{dataset_folder}/y_train_old.csv").squeeze("columns")
    y_test_old = pd.read_csv(f"{dataset_folder}/y_test_old.csv").squeeze("columns")


    # Load new data
    X_train_new = pd.read_csv(f"{dataset_folder}/X_train_new.csv")
    y_train_new = pd.read_csv(f"{dataset_folder}/y_train_new.csv").squeeze("columns")
    X_test_new = pd.read_csv(f"{dataset_folder}/X_test_new.csv")
    y_test_new = pd.read_csv(f"{dataset_folder}/y_test_new.csv").squeeze("columns")


    # Train new model on combined data
    X_train = pd.concat([X_train_old, X_train_new])
    y_train = pd.concat([y_train_old, y_train_new])


    # Try GradientBoosting for better handling of mixed feature types (numerical, categorical)
    model_new = GradientBoostingClassifier(
        n_estimators=250,
        learning_rate=0.1,
        max_depth=5,
        subsample=0.8,
        random_state=42
    )


    # Handle categorical features (Smoking Status, Diet Quality, Education Level, Family History)
    # by one-hot encoding them
    categorical_cols = ['Smoking Status', 'Diet Quality', 'Education Level', 'Family History']
    X_train = pd.get_dummies(X_train, columns=categorical_cols)
    X_test_old = pd.get_dummies(X_test_old, columns=categorical_cols)
    X_test_new = pd.get_dummies(X_test_new, columns=categorical_cols)


    model_new.fit(X_train, y_train)


