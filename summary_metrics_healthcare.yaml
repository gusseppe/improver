plan_execute:
  final_code: |-
    import yaml
    import pandas as pd
    from sklearn.model_selection import train_test_split
    from sklearn.preprocessing import LabelEncoder
    from sklearn.ensemble import GradientBoostingClassifier
    from sklearn.metrics import accuracy_score
    from sklearn.model_selection import GridSearchCV
    from sklearn.model_selection import RandomizedSearchCV
    from scipy.stats import randint

    # Initialize metrics dictionary
    model_new_score = {
        'on_new_data': 0.0,
        'on_old_data': 0.0
    }

    # Define categorical features to apply Label Encoding
    categorical_features = ["Smoking Status", "Diet Quality", "Family History", "Education Level"]

    # Load data from specified folder
    dataset_folder = "datasets/healthcare"
    X_train_old = pd.read_csv(f"{dataset_folder}/X_train_old.csv")
    X_test_old = pd.read_csv(f"{dataset_folder}/X_test_old.csv")
    y_train_old = pd.read_csv(f"{dataset_folder}/y_train_old.csv").squeeze("columns")
    y_test_old = pd.read_csv(f"{dataset_folder}/y_test_old.csv").squeeze("columns")

    # Load new data
    X_train_new = pd.read_csv(f"{dataset_folder}/X_train_new.csv")
    y_train_new = pd.read_csv(f"{dataset_folder}/y_train_new.csv").squeeze("columns")
    X_test_new = pd.read_csv(f"{dataset_folder}/X_test_new.csv")
    y_test_new = pd.read_csv(f"{dataset_folder}/y_test_new.csv").squeeze("columns")

    # Apply Label Encoding to categorical features
    le = LabelEncoder()
    X_train_old[categorical_features] = X_train_old[categorical_features].apply(lambda series: series.astype("str").apply(le.fit_transform))
    X_test_old[categorical_features] = X_test_old[categorical_features].apply(lambda series: series.astype("str").apply(le.fit_transform))
    X_train_new[categorical_features] = X_train_new[categorical_features].apply(lambda series: series.astype("str").apply(le.fit_transform))
    X_test_new[categorical_features] = X_test_new[categorical_features].apply(lambda series: series.astype("str").apply(le.fit_transform))

    # Define hyperparameter search space
    param_grid = {
        'learning_rate': [0.01, 0.1, 0.5, 1],
        'n_estimators': [50, 100, 200, 300],
        'max_depth': [3, 5, 7, 9],
        'subsample': [0.5, 0.7, 0.9, 1]
    }

    # Perform Randomized Search CV to find optimal hyperparameters
    grid_search = RandomizedSearchCV(estimator=GradientBoostingClassifier(random_state=42), param_distributions=param_grid, cv=5, n_iter=10)
    grid_search.fit(pd.concat([X_train_old, X_train_new]), pd.concat([y_train_old, y_train_new]))

    # Get the best hyperparameters
    best_params = grid_search.best_params_

    # Train GradientBoostingClassifier with optimal hyperparameters
    model_new = GradientBoostingClassifier(**best_params, random_state=42)
    model_new.fit(pd.concat([X_train_old, X_train_new]), pd.concat([y_train_old, y_train_new]))

    # Evaluate model on old test set
    old_score = accuracy_score(y_test_old, model_new.predict(pd.concat([X_test_old, X_test_new])))
    print(f'New model evaluated on old distribution: {old_score}')
    model_new_score['on_old_data'] = float(old_score)

    # Evaluate model on new test set
    new_score = accuracy_score(y_test_new, model_new.predict(pd.concat([X_test_old, X_test_new])))
    print(f'New model evaluated on new distribution: {new_score}')
    model_new_score['on_new_data'] = float(new_score)

    # Save metrics
    with open('metrics_plan_execute.yaml', 'w') as f:
        yaml.dump({'model_new_score': model_new_score}, f)
  final_metrics:
    old_distribution: 0.86
    new_distribution: 0.7333333333333333
