reflection:
  final_code: |-
    import yaml
    import pandas as pd
    import numpy as np
    from sklearn.preprocessing import StandardScaler
    from sklearn.compose import ColumnTransformer
    from sklearn.pipeline import Pipeline
    from sklearn.ensemble import GradientBoostingClassifier
    from sklearn.metrics import accuracy_score
    from sklearn.preprocessing import OneHotEncoder

    # Initialize metrics dictionary
    model_new_score = {
        'on_new_data': 0.0,
        'on_old_data': 0.0
    }

    # Load data from specified folder
    dataset_folder = "datasets/healthcare"
    X_train_old = pd.read_csv(f"{dataset_folder}/X_train_old.csv")
    X_test_old = pd.read_csv(f"{dataset_folder}/X_test_old.csv")
    y_train_old = pd.read_csv(f"{dataset_folder}/y_train_old.csv").squeeze("columns")
    y_test_old = pd.read_csv(f"{dataset_folder}/y_test_old.csv").squeeze("columns")

    # Load new data
    X_train_new = pd.read_csv(f"{dataset_folder}/X_train_new.csv")
    y_train_new = pd.read_csv(f"{dataset_folder}/y_train_new.csv").squeeze("columns")
    X_test_new = pd.read_csv(f"{dataset_folder}/X_test_new.csv")
    y_test_new = pd.read_csv(f"{dataset_folder}/y_test_new.csv").squeeze("columns")

    # Define feature types
    numerical_features = ['Age', 'BMI', 'Blood Pressure', 'Cholesterol', 'Physical Activity', 'Income']
    categorical_features = ['Smoking Status', 'Diet Quality', 'Family History', 'Education Level']

    # Create preprocessing pipeline for numerical features
    numerical_transformer = StandardScaler()

    # Create preprocessing pipeline for categorical features
    categorical_transformer = OneHotEncoder(handle_unknown='ignore')

    # Create Column Transformer to choose preprocessing pipeline based on feature types
    preprocessor = ColumnTransformer(
        transformers=[
            ('num', numerical_transformer, numerical_features),
            ('cat', categorical_transformer, categorical_features)
        ],
        remainder='passthrough'
    )

    # Create pipeline with preprocessing and model
    pipeline = Pipeline([
        ('preprocessor', preprocessor),
        ('classifier', GradientBoostingClassifier(
            n_estimators=500,  # Increased number of estimators
            learning_rate=0.01,  # Smaller learning rate
            max_depth=5,  # Increased maximum depth
            subsample=1.0,  # Did not use subsampling
            random_state=42
        ))
    ])

    # Combine old and new training data
    X_train_combined = pd.concat([X_train_old, X_train_new])
    y_train_combined = pd.concat([y_train_old, y_train_new])

    # Ensure all column names are strings to avoid type errors
    X_train_combined.columns = X_train_combined.columns.astype(str)
    X_test_old.columns = X_test_old.columns.astype(str)
    X_test_new.columns = X_test_new.columns.astype(str)

    # Train the pipeline
    pipeline.fit(X_train_combined, y_train_combined)

    # Evaluate on old distribution
    old_predictions = pipeline.predict(X_test_old)
    old_score = accuracy_score(y_test_old, old_predictions)
    print(f'New model evaluated on old distribution: {old_score}')
    model_new_score['on_old_data'] = float(old_score)

    # Evaluate on new distribution
    new_predictions = pipeline.predict(X_test_new)
    new_score = accuracy_score(y_test_new, new_predictions)
    print(f'New model evaluated on new distribution: {new_score}')
    model_new_score['on_new_data'] = float(new_score)

    # Save metrics
    with open('metrics_reflection.yaml', 'w') as f:
        yaml.dump({'model_new_score': model_new_score}, f)
  final_metrics:
    old_distribution: 0.8733333333333333
    new_distribution: 0.8
react:
  final_code: |-
    import yaml
    import pandas as pd
    from xgboost import XGBClassifier
    from sklearn.model_selection import train_test_split
    from sklearn.model_selection import RandomizedSearchCV
    from sklearn.metrics import accuracy_score
    from scipy.stats import randint

    # Initialize metrics dictionary
    model_new_score = {
        'on_new_data': 0.0,
        'on_old_data': 0.0
    }

    # Load old data
    dataset_folder = "datasets/healthcare"
    X_train_old = pd.read_csv(f"{dataset_folder}/X_train_old.csv")
    X_test_old = pd.read_csv(f"{dataset_folder}/X_test_old.csv")
    y_train_old = pd.read_csv(f"{dataset_folder}/y_train_old.csv").squeeze("columns")
    y_test_old = pd.read_csv(f"{dataset_folder}/y_test_old.csv").squeeze("columns")

    # Load new data
    X_train_new = pd.read_csv(f"{dataset_folder}/X_train_new.csv")
    y_train_new = pd.read_csv(f"{dataset_folder}/y_train_new.csv").squeeze("columns")
    X_test_new = pd.read_csv(f"{dataset_folder}/X_test_new.csv")
    y_test_new = pd.read_csv(f"{dataset_folder}/y_test_new.csv").squeeze("columns")

    # Combine training data
    X_train = pd.concat([X_train_old, X_train_new])
    y_train = pd.concat([y_train_old, y_train_new])

    # Define hyperparameter tuning space
    param_grid = {
        'max_depth': randint(3, 10),
        'learning_rate': [0.1, 0.5, 1],
        'n_estimators': randint(10, 100),
        'gamma': [0, 0.25, 0.5],
        'subsample': [0.5, 0.75, 1],
        'colsample_bytree': [0.5, 0.75, 1],
        'reg_alpha': [0, 0.5, 1]
    }

    # Initialize model and hyperparameter search
    model_new = XGBClassifier()
    randomized_search = RandomizedSearchCV(model_new, param_grid, cv=5, n_iter=10, random_state=42)

    # Perform hyperparameter tuning on combined training data
    randomized_search.fit(X_train, y_train)

    # Evaluate on old distribution
    new_score_old = accuracy_score(y_test_old, randomized_search.predict(X_test_old))
    print(f'New model trained and evaluated on old distribution: {new_score_old}')
    model_new_score['on_old_data'] = float(new_score_old)

    # Evaluate on new distribution
    new_score_new = accuracy_score(y_test_new, randomized_search.predict(X_test_new))
    print(f'New model evaluated on new distribution: {new_score_new}')
    model_new_score['on_new_data'] = float(new_score_new)

    # Save metrics
    with open('metrics_react.yaml', 'w') as f:
        yaml.dump({'model_new_score': model_new_score}, f)
  final_metrics:
    old_distribution: 0.88
    new_distribution: 0.8
